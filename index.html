<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SafeTech Security</title>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        color: white;
        font-family: Arial, sans-serif;
      }

      header {
        background: #111827;
        padding: 20px;
        text-align: center;
      }

      .logo {
        font-size: 32px;
        font-weight: bold;
        color: #22c55e;
      }

      .container {
        width: 90%;
        margin: auto;
        padding: 20px;
      }

      .video {
        text-align: center;
      }

      .video img {
        width: 100%;
        max-width: 1000px;
        border: 4px solid #22c55e;
        border-radius: 10px;
      }

      .status {
        margin-top: 20px;
        text-align: center;
        font-size: 24px;
        color: #22c55e;
      }

      .card {
        background: #1e293b;
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">SAFETECH SECURITY</div>

      <h2>Sistema Inteligente de Control de Acceso</h2>
    </header>

    <div class="container">
      <div class="video">
        <img src="/video" />
      </div>

      <div class="status">Monitoreando trabajadores en tiempo real</div>

      <div class="card">
        <h3>Reglas de Seguridad</h3>

        <ul>
          <li>Uso obligatorio de casco.</li>
          <li>Uso de chaleco reflectante.</li>
          <li>Acceso restringido sin EPP.</li>
          <li>Monitoreo mediante Inteligencia Artificial.</li>
        </ul>
      </div>
    </div>
  </body>
</html>
